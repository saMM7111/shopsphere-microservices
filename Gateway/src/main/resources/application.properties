spring.application.name=Gateway
server.port=7082

eureka.client.service-url.defaultZone=
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=users-route
spring.cloud.gateway.routes[0].uri=lb://users
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=usersCircuitBreaker,forward:/fallback/users

spring.cloud.gateway.routes[1].id=products-route
spring.cloud.gateway.routes[1].uri=lb://products
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**

spring.cloud.gateway.routes[2].id=inventory-route
spring.cloud.gateway.routes[2].uri=lb://inventory
spring.cloud.gateway.routes[2].predicates[0]=Path=/inventory/**

spring.cloud.gateway.routes[3].id=cart-route
spring.cloud.gateway.routes[3].uri=lb://cart
spring.cloud.gateway.routes[3].predicates[0]=Path=/cart/**

spring.cloud.gateway.routes[4].id=order-route
spring.cloud.gateway.routes[4].uri=lb://order
spring.cloud.gateway.routes[4].predicates[0]=Path=/orders/**

spring.cloud.gateway.routes[5].id=payment-route
spring.cloud.gateway.routes[5].uri=lb://payment
spring.cloud.gateway.routes[5].predicates[0]=Path=/payments/**

spring.cloud.gateway.routes[6].id=notification-route
spring.cloud.gateway.routes[6].uri=lb://notification
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**

resilience4j.circuitbreaker.instances.usersCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.usersCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.usersCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.timelimiter.instances.usersCircuitBreaker.timeout-duration=5s

management.endpoints.web.exposure.include=gateway,health,info