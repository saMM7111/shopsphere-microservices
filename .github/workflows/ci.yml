name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate root pom.xml
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository root: $(pwd)"
          test -f pom.xml
          echo "First 5 lines of pom.xml:"
          sed -n '1,5p' pom.xml
          echo "First 80 bytes (hex):"
          od -An -tx1 -N80 pom.xml
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("pom.xml")
          print("pom.xml is well-formed XML")
          PY

      - name: Build and run tests
        run: mvn -B -ntp --file pom.xml clean verify